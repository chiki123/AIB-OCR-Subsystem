# ============================================================
# AIB OCR Subsystem — Alembic Configuration
# ============================================================
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# --- الكود الأصلي ---
# sqlalchemy.url = driver://user:pass@localhost/dbname
# --------------------
# التعديل: ربط قاعدة البيانات بشكل صحيح لبيئة Docker
sqlalchemy.url = postgresql://aib_user:CHANGE_ME_STRONG_PASSWORD@postgres:5432/aib_ocr

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S 