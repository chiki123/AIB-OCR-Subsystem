# ============================================================
# AIB OCR Subsystem — Nginx Configuration (Local HTTP Version)
# /etc/nginx/conf.d/aib_ocr.conf
# ============================================================

upstream aib_api {
    server api:8000;
    keepalive 32;
}

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=upload_limit:10m rate=10r/m;
limit_req_zone  $binary_remote_addr zone=api_limit:10m    rate=100r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Main HTTP Server (No SSL for Localhost) ──────────────────────────────────
server {
    listen 80;
    server_name localhost _;

    # Безопасность
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Максимальный размер загружаемого файла
    client_max_body_size 55M;
    client_body_timeout  60s;

    # Ограничение соединений
    limit_conn conn_limit 20;

    # ── Загрузка файлов ────────────────────────────────────────────────
    location /api/v1/documents/upload {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass http://aib_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличенные таймауты для загрузки файлов
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Буферизация для больших файлов
        proxy_request_buffering on;
        proxy_buffering         off;
    }

    # ── Общие API endpoint'ы ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://aib_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── Документация (Swagger) ────────────────────────────────────────
    location /docs {
        proxy_pass http://aib_api/docs;
        proxy_set_header Host $host;
    }
    
    location /openapi.json {
        proxy_pass http://aib_api/openapi.json;
        proxy_set_header Host $host;
    }

    location /api/docs {
        proxy_pass http://aib_api;
        proxy_set_header Host $host;
    }

    # ── Статика (если есть) ───────────────────────────────────────────
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Запрет доступа к системным путям ──────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Логи ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/aib_ocr_access.log custom_log;
    error_log  /var/log/nginx/aib_ocr_error.log  warn;
}